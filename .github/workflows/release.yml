name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to publish or republish"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Validate tag format
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "Only tags starting with v are supported: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller
          pyinstaller --noconfirm office-docs-to-md-sync.spec
          tar -C dist -czf dist/office-docs-to-md-sync-linux-x86_64.tar.gz office-docs-to-md-sync

      - name: Derive release version
        id: version
        run: |
          echo "value=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          artifacts: "dist/*.tar.gz"
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          generateReleaseNotes: true
          makeLatest: true

      - name: Compute image name
        id: image
        run: |
          echo "value=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.value }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
