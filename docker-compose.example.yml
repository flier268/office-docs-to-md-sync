services:
  office-docs-to-md-sync:
    image: ghcr.io/flier268/office-docs-to-md-sync:latest
    container_name: office-docs-to-md-sync
    ports:
      - "8080:8080"
    environment:
      APP_DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: 8080
    volumes:
      - ./data:/data
    restart: unless-stopped
